<!DOCTYPE html>
<html>
<head>
<style>
.cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: stretch; }
.card { display: flex; flex-direction: column; height: 100%; border: 1px solid black; }
.meta { display: flex; flex-direction: column; flex: 1; padding: 20px; }
.deg { font-size: 24px; }
h3 { margin: 10px 0; }
p { margin: 0; margin-bottom: 16px; }
.buy { margin-top: auto; display: flex; justify-content: space-between; background: lightgray; padding: 10px; }
.medals { margin-top: 10px; background: gold; padding: 10px; }
</style>
</head>
<body>
<div class="cards">
  <div class="card">
    <div class="meta">
      <div class="deg">37</div>
      <h3>Title</h3>
      <p>Short text</p>
      <div class="buy">Buy 37</div>
    </div>
  </div>
  <div class="card">
    <div class="meta">
      <div class="deg">40</div>
      <h3>Title</h3>
      <p>Text</p>
      <div class="buy">Buy 40</div>
      <div class="medals">Medals</div>
    </div>
  </div>
  <div class="card">
    <div class="meta">
      <div class="deg">55</div>
      <h3>Title</h3>
      <p>Text</p>
      <div class="buy">Buy 55</div>
    </div>
  </div>
</div>
</body>
</html>
